syntax = "proto3";

package sourccey;

// Simplified camera image message - just name and raw bytes
message CameraImage {
    string name = 1;           // Camera name/key (e.g., "wrist_left", "wrist_right", "front", "rear")
    bytes image_data = 2;       // Raw image bytes (JPEG encoded)
}

// Motor joint information for a single arm
message MotorJoint {
    float shoulder_pan = 1;
    float shoulder_lift = 2;
    float elbow_flex = 3;
    float wrist_flex = 4;
    float wrist_roll = 5;
    float gripper = 6;
}

// Base velocity information (mobile base + yaw)
message BaseVelocity {
    float x_vel = 1;
    float y_vel = 2;
    float theta_vel = 3;
}

// Base position information (linear actuator)
message BasePosition {
    float z_pos = 1;          // Linear actuator position
}

// Complete sourccey robot state (2 arms + base + cameras)
message SourcceyRobotState {
    // Motor Joint State
    MotorJoint left_arm_joints = 1;
    MotorJoint right_arm_joints = 2;

    // Base State
    BasePosition base_position = 3;
    BaseVelocity base_velocity = 4;

    // Camera State - simplified to just name and bytes
    repeated CameraImage cameras = 5;

    // Monotonic counters incremented by the host whenever it observes a new
    // recording request coming from the Unity control stream.
    uint32 recording_start_counter = 6;
    uint32 recording_stop_counter = 7;
    uint32 recording_rerecord_counter = 8;
}

// Complete sourccey robot action
message SourcceyRobotAction {
    // Motor Joint Action
    MotorJoint left_arm_target_joints = 1;
    MotorJoint right_arm_target_joints = 2;

    // Base Action
    BasePosition base_target_position = 3;
    BaseVelocity base_target_velocity = 4;

    // Host control actions (per-arm)
    bool untorque_left = 5;
    bool untorque_right = 6;

    // One-shot requests from the Unity client asking the host/client recorder
    // pipeline to start, stop, or rerecord the current episode. The host
    // detects rising edges and increments the matching counters in
    // SourcceyRobotState.
    bool request_recording_start = 7;
    bool request_recording_stop = 8;
    bool request_recording_rerecord = 9;
}
